<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Tree App</title>
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            font-family: Arial, sans-serif;
        }
        .step-counter {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .result-message {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid white;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <h1>Decision Tree Application</h1>
    <div id="decision-tree">
        <div class="step-counter" id="stepCounter">Step: 1</div>
        <div id="question"></div>
        <div id="options"></div>
    </div>
    <div class="result-message" id="result"></div>

    <script>
        let currentStep = 0;
        const questions = {
            computerTime: [
                "Do you have any assignments to finish?",
                "Are you feeling motivated?",
                "Would you like to reward yourself afterward?"
            ],
            foodSnacks: [
                "Are you hungry?",
                "Do you want something healthy?",
                "Would you prefer a snack or a meal?"
            ],
            goingOut: [
                "Is the weather nice outside?",
                "Do you have plans for the evening?",
                "Is there a place you want to visit?"
            ],
            contactMom: [
                "Do you need help?",
                "Is there something you want to share?",
                "Would you like to ask for advice?"
            ],
            cleaningMesses: [
                "Is your room messy?",
                "Do you have time to clean?",
                "Would you like to listen to music while cleaning?"
            ],
            textingRules: [
                "Are you allowed to use your phone?",
                "Do you want to wait for a response?",
                "Is it urgent to contact someone?"
            ]
        };

        function showNextQuestion() {
            let scenario = Object.keys(questions)[currentStep % Object.keys(questions).length];
            let question = questions[scenario][(currentStep / Object.keys(questions).length) % questions[scenario].length];
            document.getElementById('question').innerText = question;
            // You can add options for YES/NO or other choices here
            currentStep++;
            document.getElementById('stepCounter').innerText = 'Step: ' + (currentStep + 1);
        }

        showNextQuestion();
    </script>
</body>
</html>
